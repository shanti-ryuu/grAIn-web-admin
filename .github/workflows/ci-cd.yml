name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npx next lint --no-cache
        env:
          CI: true
          MONGO_URI: "mongodb://placeholder:27017/grain"
          JWT_SECRET: "ci-placeholder-secret-32chars-min"
          NEXT_PUBLIC_API_URL: "https://grain-web-admin.onrender.com/api"
      
      - name: Type check
        run: npx tsc --noEmit
        env:
          CI: true
      
      - name: Build project
        run: npm run build
        env:
          CI: true
          MONGO_URI: ${{ secrets.MONGO_URI || 'mongodb://placeholder:27017/grain' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-placeholder-secret-min-32-chars-long' }}
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'grAIn-admin'
          path: '.'
          format: 'JSON'
        continue-on-error: true
